name: dandii

services:
  postgis:
    image: postgis/postgis
    container_name: dandii-dev-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: gtfs_dev_db
    ports:
      # Bound to localhost only — reachable from the host machine (e.g. for
      # `prisma studio` or an SSH tunnel) but never from the public internet.
      # 5433 avoids clashing with a locally installed Postgres.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d gtfs_dev_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  otp:
    image: opentripplanner/opentripplanner:latest
    container_name: otp-routing
    restart: unless-stopped
    ports:
      # Host port 8081 (not 8080) — avoids clashing with another app already
      # using 8080 on the VPS. Internal container port stays 8080; `web`
      # talks to it over the Docker network via OTP_URL=http://otp:8080.
      - "127.0.0.1:8081:8080"
    volumes:
      # Contains et-addisababa-gtfs-2026.zip (no OSM extract — OTP runs
      # transit-only, no street-level walk legs).
      - ./otp-data:/var/opentripplanner
    # `:latest` for this image tracks a rolling dev-2.x snapshot, so its
    # internal graph serialization format can change between pulls. Always
    # rebuild from the GTFS zip rather than loading a graph.obj that may
    # have been produced by a different snapshot — otherwise OTP refuses
    # to start with a "serialization version id" mismatch. Once graph.obj
    # is rebuilt here, restarts still take ~2 min unless you pin the image
    # to a fixed digest (see README) and switch back to "--load --serve".
    command: "--build --save --serve"

  web:
    build: ./web
    container_name: dandii-web
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
      otp:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:adminpassword@postgis:5432/gtfs_dev_db
      OTP_URL: http://otp:8080
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}

volumes:
  postgis_data:
